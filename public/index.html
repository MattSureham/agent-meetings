<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamAgents — Meeting Console</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #d4d4d8; height: 100vh; display: flex; }
  a { color: #7eb6ff; }

  /* Left panel */
  .sidebar { width: 420px; min-width: 420px; background: #16181f; display: flex; flex-direction: column; border-right: 1px solid #252830; overflow-y: auto; }
  .sidebar-header { padding: 20px 24px 16px; border-bottom: 1px solid #252830; }
  .sidebar-header h1 { font-size: 20px; font-weight: 600; color: #fff; }
  .sidebar-header span { font-size: 13px; color: #6b7280; }
  .sidebar-body { padding: 20px 24px; flex: 1; display: flex; flex-direction: column; gap: 18px; }

  label { display: block; font-size: 13px; font-weight: 500; color: #a1a5b0; margin-bottom: 6px; }
  textarea, input[type=text], input[type=number], select { width: 100%; padding: 10px 12px; background: #1c1e26; border: 1px solid #2d3039; border-radius: 6px; color: #e4e4e7; font-size: 14px; font-family: inherit; resize: vertical; }
  textarea:focus, input:focus, select:focus { outline: none; border-color: #4f8fff; }
  textarea { min-height: 60px; }
  textarea.tall { min-height: 90px; }

  .file-upload { display: flex; gap: 8px; }
  .file-upload input[type=file] { display: none; }
  .file-upload .btn { flex-shrink: 0; }
  .file-name { flex: 1; padding: 10px 12px; background: #1c1e26; border: 1px solid #2d3039; border-radius: 6px; font-size: 13px; color: #6b7280; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: flex; align-items: center; }

  .agent-grid { display: flex; flex-wrap: wrap; gap: 6px; max-height: 200px; overflow-y: auto; padding: 2px; }
  .agent-chip { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid #2d3039; background: #1c1e26; color: #a1a5b0; transition: all 0.15s; user-select: none; }
  .agent-chip:hover { border-color: #4f8fff33; background: #1f2330; }
  .agent-chip.selected { border-color: #4f8fff; background: #1a2740; color: #fff; }
  .agent-chip .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .agent-chip .dot.llm { background: #a78bfa; }
  .agent-chip .dot.browser { background: #fb923c; }
  .agent-chip .dot.subprocess { background: #34d399; }
  .agent-chip .dot.protocol { background: #fbbf24; }
  .agent-chip .tag { font-size: 10px; padding: 1px 5px; border-radius: 8px; background: #252830; color: #6b7280; text-transform: uppercase; }

  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .settings-grid label { margin-bottom: 3px; font-size: 12px; }
  .settings-grid input, .settings-grid select { padding: 7px 10px; font-size: 13px; }

  .btn { padding: 10px 18px; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
  .btn-primary { background: #4f8fff; color: #fff; flex: 1; }
  .btn-primary:hover { background: #3d7ae8; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-danger { background: #dc3545; color: #fff; flex: 1; }
  .btn-danger:hover { background: #c82333; }
  .btn-danger:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-outline { background: transparent; border: 1px solid #2d3039; color: #a1a5b0; }
  .btn-outline:hover { border-color: #4f8fff; color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  .mode-toggle { display: flex; border-radius: 6px; overflow: hidden; border: 1px solid #2d3039; }
  .mode-toggle button { flex: 1; padding: 9px 12px; background: #1c1e26; border: none; color: #a1a5b0; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .mode-toggle button.active { background: #4f8fff; color: #fff; }
  .mode-toggle button:not(.active):hover { background: #22242e; }

  /* Spinner */
  .spinner { width: 16px; height: 16px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin 0.6s linear infinite; display: none; }
  button.loading .spinner { display: inline-block; }
  button.loading .btn-label { opacity: 0.7; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Right panel */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .main-header { padding: 20px 24px 16px; border-bottom: 1px solid #252830; display: flex; align-items: center; justify-content: space-between; }
  .main-header h2 { font-size: 18px; font-weight: 600; color: #fff; }
  .main-header .status { font-size: 13px; padding: 4px 10px; border-radius: 12px; }
  .status.idle { background: #252830; color: #6b7280; }
  .status.active { background: #1a3a1a; color: #34d399; animation: pulse 2s infinite; }
  .status.concluded { background: #252830; color: #a1a5b0; }
  .status.cancelled { background: #2d1a1a; color: #fca5a5; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  .waiting-indicator { display: flex; align-items: center; gap: 8px; padding: 10px 14px; color: #93c5fd; font-size: 13px; animation: pulse 2s infinite; }
  .waiting-indicator .dot-pulse { width: 8px; height: 8px; background: #4f8fff; border-radius: 50%; animation: pulse 0.8s infinite; }
  .status-bar { display: flex; align-items: center; gap: 10px; padding: 10px 24px; background: #1a2430; border-top: 1px solid #253350; color: #93c5fd; font-size: 13px; animation: pulse 2s infinite; flex-shrink: 0; }
  .status-bar .dot-pulse { width: 8px; height: 8px; background: #4f8fff; border-radius: 50%; animation: pulse 0.8s infinite; flex-shrink: 0; }
  .main-body { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 4px; }

  .transcript-empty { text-align: center; padding: 80px 20px; color: #4a4d56; }
  .transcript-empty .icon { font-size: 48px; margin-bottom: 12px; }
  .transcript-empty p { font-size: 15px; }

  .msg { display: flex; gap: 12px; padding: 10px 14px; border-radius: 6px; transition: background 0.15s; }
  .msg:hover { background: #1a1c24; }
  .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .msg.system .msg-avatar { background: #3b3354; color: #a78bfa; }
  .msg.agent .msg-avatar { background: #1a3a2a; color: #34d399; }
  .msg-body { flex: 1; min-width: 0; }
  .msg-meta { font-size: 12px; color: #6b7280; margin-bottom: 4px; display: flex; gap: 8px; align-items: center; }
  .msg-author { font-weight: 600; color: #d4d4d8; }
  .msg-phase { padding: 1px 6px; border-radius: 8px; background: #1f2330; font-size: 10px; text-transform: uppercase; color: #7eb6ff; }
  .msg-content { font-size: 14px; line-height: 1.6; color: #c4c8d0; white-space: pre-wrap; word-break: break-word; }

  .phase-divider { text-align: center; padding: 16px 0 8px; color: #4f8fff; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  .phase-divider::before, .phase-divider::after { content: ' ── '; color: #252830; }

  .summary-box { background: #1a1f2e; border: 1px solid #253350; border-radius: 8px; padding: 20px; margin-top: 16px; }
  .summary-box h3 { font-size: 16px; color: #7eb6ff; margin-bottom: 12px; }
  .summary-box ul { padding-left: 20px; }
  .summary-box li { margin-bottom: 6px; font-size: 14px; line-height: 1.5; }

  .banner { padding: 10px 16px; border-radius: 6px; font-size: 13px; margin-bottom: 12px; }
  .banner-error { background: #2d1a1a; border: 1px solid #5c2020; color: #fca5a5; }
  .banner-success { background: #1a2d1a; border: 1px solid #205c20; color: #6ee7b7; }
  .banner-info { background: #1a2430; border: 1px solid #253350; color: #93c5fd; }

  .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .confirm-box { background: #1c1e26; border: 1px solid #3d3040; border-radius: 8px; padding: 24px; text-align: center; max-width: 320px; }
  .confirm-box p { margin-bottom: 16px; font-size: 15px; }
  .confirm-box .btn { margin: 0 6px; }
.dir-entry { padding: 4px 8px; cursor: pointer; border-radius: 4px; font-size: 13px; color: #d4d4d8; display: flex; justify-content: space-between; align-items: center; }
.dir-entry:hover { background: #252830; }
.dir-entry .select-link { color: #4f8fff; font-size: 11px; padding: 2px 6px; border-radius: 4px; }
.dir-entry .select-link:hover { background: #1a2740; }
</style>
</head>
<body>

<!-- Confirmation overlay -->
<div class="confirm-overlay" id="confirm-overlay" style="display:none">
  <div class="confirm-box">
    <p>Stop this meeting?</p>
    <p style="font-size:13px;color:#6b7280">The meeting will be cancelled and agents will stop responding.</p>
    <button class="btn btn-danger" id="confirm-stop">Yes, stop it</button>
    <button class="btn btn-outline" id="confirm-cancel">No, continue</button>
  </div>
</div>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-header">
    <h1>TeamAgents</h1>
    <span>Meeting Console</span>
  </div>
  <div class="sidebar-body">
    <div id="banner-container"></div>

    <div>
      <label for="topic">Topic</label>
      <textarea id="topic" placeholder="What should the agents discuss or build?"></textarea>
    </div>

    <div>
      <label>Context (optional)</label>
      <textarea id="context" class="tall" placeholder="Background information, constraints, or goals..."></textarea>
      <div class="file-upload" style="margin-top:6px">
        <button class="btn btn-outline btn-sm" id="ctx-upload-btn">Upload file</button>
        <input type="file" id="ctx-file" accept=".txt,.md,.json,.yaml,.yml">
        <span class="file-name" id="ctx-file-name">No file selected</span>
      </div>
    </div>

    <div>
      <label>Agents <span style="color:#6b7280;font-weight:400">(select 2+)</span></label>
      <div class="agent-grid" id="agent-list">
        <span style="color:#6b7280;font-size:13px;padding:6px">Loading agents...</span>
      </div>
    </div>

    <div>
      <label for="moderator">Moderator</label>
      <select id="moderator"></select>
    </div>

    <div>
      <label>Meeting Mode</label>
      <div class="mode-toggle" id="mode-toggle">
        <button data-mode="debate" class="active">Debate</button>
        <button data-mode="collaboration">Collaboration</button>
      </div>
    </div>

    <div id="workdir-group">
      <label>Working Directory <span style="color:#6b7280;font-weight:400">(for collaboration — agents share this folder)</span></label>
      <div style="display:flex;gap:6px;align-items:center">
        <input type="text" id="workdir" placeholder="e.g. ./workspace/my-project" style="flex:1">
        <button class="btn btn-outline btn-sm" id="btn-browse" title="Browse folders">Browse</button>
      </div>
      <div id="dir-browser" style="display:none;margin-top:6px;background:#1c1e26;border:1px solid #2d3039;border-radius:6px;padding:8px;max-height:180px;overflow-y:auto">
        <div id="dir-browser-path" style="font-size:11px;color:#6b7280;margin-bottom:6px;word-break:break-all"></div>
        <div id="dir-browser-entries"></div>
	        <div id="dir-browser-new" style="display:flex;gap:4px;margin-top:6px;border-top:1px solid #252830;padding-top:6px">
	          <input type="text" id="dir-browser-new-name" placeholder="New folder name" style="flex:1;padding:5px 8px;font-size:12px">
	          <button class="btn btn-outline btn-sm" id="btn-mkdir">Create</button>
	        </div>
      </div>
    </div>

    <div class="settings-grid">
      <div><label>Rebuttal Rounds</label><input type="number" id="rebuttal-rounds" value="1" min="0" max="10"></div>
      <div><label>Deliberation Turns</label><input type="number" id="deliberation-turns" value="10" min="1" max="100"></div>
      <div><label>Max Total Turns</label><input type="number" id="max-turns" value="50" min="5" max="500"></div>
      <div><label>Turn Timeout (ms)</label><input type="number" id="turn-timeout" value="60000" min="5000" step="5000"></div>
    </div>

    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" id="btn-start" disabled>
        <span class="spinner"></span>
        <span class="btn-label">Start Meeting</span>
      </button>
      <button class="btn btn-danger" id="btn-stop" disabled style="display:none">
        Stop Meeting
      </button>
    </div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="main-header">
    <h2 id="meeting-title">No active meeting</h2>
    <span class="status idle" id="meeting-status">idle</span>
  </div>
  <div class="main-body" id="transcript-container">
    <div class="transcript-empty" id="empty-state">
      <div class="icon">🧑‍💻</div>
      <p>Set up a meeting on the left and press <strong>Start Meeting</strong>.</p>
    </div>
  </div>
  <div class="status-bar" id="status-bar" style="display:none">
    <span class="dot-pulse"></span>
    <span id="status-bar-text"></span>
  </div>
</div>

<script>
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

let meetingId = null;
let pollTimer = null;
let agents = [];
let meetingActive = false;

// ── Init ──
async function init() {
  try {
    const res = await fetch('/agents');
    agents = await res.json();
    renderAgentChips();
    renderModeratorSelect();
  } catch(e) { showBanner('error', 'Failed to load agents. Is the server running?'); }

  $('#btn-start').addEventListener('click', startMeeting);
  $('#btn-stop').addEventListener('click', showStopConfirm);
  $('#ctx-upload-btn').addEventListener('click', () => $('#ctx-file').click());
  $('#ctx-file').addEventListener('change', handleFileUpload);
  $$('#mode-toggle button').forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));
  $('#confirm-stop').addEventListener('click', confirmStop);
  $('#confirm-cancel').addEventListener('click', hideStopConfirm);
  $('#topic').addEventListener('input', updateStartButton);
  $('#btn-browse').addEventListener('click', toggleBrowser);
  $('#btn-mkdir').addEventListener('click', createFolder);

  // Restore meeting after page refresh
  var savedId = sessionStorage.getItem('meetingId');
  if (savedId) {
    meetingId = savedId;
    meetingActive = true;
    updateUIForActive();
    $('#meeting-title').textContent = sessionStorage.getItem('meetingTopic') || '';
    updateStatus('active');
    seenMessageCount = 0;
    lastPhase = null;
    startPolling();
  }
  $('#btn-mkdir').addEventListener('click', createFolder);
  $('#dir-browser-new-name').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') createFolder();
  });
}

// ── Agent chips ──
function renderAgentChips() {
  const container = $('#agent-list');
  container.innerHTML = agents.map(a => `
    <div class="agent-chip" data-id="${a.id}" onclick="toggleAgent(this)">
      <span class="dot ${a.type}"></span>
      ${a.name}
      <span class="tag">${a.type}</span>
    </div>
  `).join('');
}

function toggleAgent(chip) {
  if (meetingActive) return;
  chip.classList.toggle('selected');
  updateStartButton();
}

function getSelectedAgents() {
  return [...$$('.agent-chip.selected')].map(c => c.dataset.id);
}

function renderModeratorSelect() {
  const sel = $('#moderator');
  sel.innerHTML = agents.map(a => `<option value="${a.id}">${a.name} (${a.type})</option>`).join('');
}

function updateStartButton() {
  const topic = $('#topic').value.trim();
  const selected = getSelectedAgents().length;
  $('#btn-start').disabled = meetingActive || !topic || selected < 2;
}

// Watch for chip changes
new MutationObserver(updateStartButton).observe($('#agent-list'), { subtree: true, attributes: true, attributeFilter: ['class'] });

// ── File upload ──
function handleFileUpload() {
  const file = $('#ctx-file').files[0];
  if (!file) return;
  $('#ctx-file-name').textContent = file.name;
  const reader = new FileReader();
  reader.onload = () => { $('#context').value = reader.result; };
  reader.readAsText(file);
}

// ── Mode toggle ──
function setMode(mode) {
  $$('#mode-toggle button').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
}

function getMode() {
  return $('#mode-toggle').querySelector('.active')?.dataset.mode ?? 'debate';
}

// ── Start meeting ──
async function startMeeting() {
  const topic = $('#topic').value.trim();
  const context = $('#context').value.trim();
  const participantIds = getSelectedAgents();
  const moderatorId = $('#moderator').value;
  const mode = getMode();
  const workDir = $('#workdir').value.trim() || undefined;

  if (!topic || participantIds.length < 2) return;

  const btn = $('#btn-start');
  btn.classList.add('loading');
  btn.querySelector('.btn-label').textContent = 'Starting...';
  clearBanner();

  try {
    const res = await fetch('/meetings', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        topic, context, participantIds, moderatorId,
        autoStart: true, mode, workDir,
      }),
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error); }
    const data = await res.json();
    meetingId = data.id;
    meetingActive = true;
    sessionStorage.setItem('meetingId', meetingId);
    sessionStorage.setItem('meetingTopic', topic);
    updateUIForActive();
    $('#meeting-title').textContent = topic;
    updateStatus('active');
    seenMessageCount = 0;
    lastPhase = null;
    $('#transcript-container').innerHTML = '';
    showBanner('success', 'Meeting started — agents are responding...');
    startPolling();
  } catch(e) {
    showBanner('error', 'Failed to start: ' + escapeHtml(e.message));
  } finally {
    btn.classList.remove('loading');
    btn.querySelector('.btn-label').textContent = 'Start Meeting';
    updateStartButton();
  }
}

function updateUIForActive() {
  $('#btn-start').disabled = true;
  $('#btn-stop').disabled = false;
  $('#btn-stop').style.display = '';
  // Disable agent selection changes
  $$('.agent-chip').forEach(c => c.style.pointerEvents = 'none');
  $('#topic').disabled = true;
}

function updateUIForIdle() {
  $('#btn-start').disabled = false;
  $('#btn-stop').disabled = true;
  $('#btn-stop').style.display = 'none';
  $$('.agent-chip').forEach(c => c.style.pointerEvents = '');
  $('#topic').disabled = false;
}

// ── Stop meeting ──
function showStopConfirm() {
  $('#confirm-overlay').style.display = 'flex';
}
function hideStopConfirm() {
  $('#confirm-overlay').style.display = 'none';
}

async function confirmStop() {
  hideStopConfirm();
  if (!meetingId) return;

  const btn = $('#btn-stop');
  btn.disabled = true;
  btn.textContent = 'Stopping...';

  try {
    await fetch(`/meetings/${meetingId}/cancel`, { method: 'POST' });
  } catch(e) { /* ignore */ }

  stopPolling();
  clearMeetingState();
  updateStatus('cancelled');
  meetingActive = false;
  updateUIForIdle();
  btn.textContent = 'Stop Meeting';
  showBanner('info', 'Meeting stopped.');
}

// ── Polling ──
function startPolling() {
  stopPolling();
  pollTimer = setInterval(pollMeeting, 1500);
  pollMeeting();
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

let seenMessageCount = 0;
let lastPhase = null;
const PHASE_LABELS = {
  opening: 'OPENING — Topic Introduction',
  position: 'POSITION — Statements',
  rebuttal: 'REBUTTAL — Responses',
  deliberation: 'DELIBERATION — Discussion',
  voting: 'VOTING — Casting Votes',
  plan: 'PLAN — Proposing Approach',
  build: 'BUILD — Implementation',
  review: 'REVIEW — Reviewing Output',
  summary: 'SUMMARY',
  concluded: 'CONCLUDED',
};

async function pollMeeting() {
  if (!meetingId) return;
  try {
    const res = await fetch(`/meetings/${meetingId}`);
    if (!res.ok) return;
    const meeting = await res.json();
    updateStatus(meeting.status);

    const container = $('#transcript-container');
    const msgs = meeting.transcript || [];

    // Render new messages
    for (let i = seenMessageCount; i < msgs.length; i++) {
      const msg = msgs[i];
      if (msg.phase !== lastPhase) {
        lastPhase = msg.phase;
        const label = PHASE_LABELS[msg.phase] ?? msg.phase.toUpperCase();
        const div = document.createElement('div');
        div.className = 'phase-divider';
        div.textContent = label;
        container.appendChild(div);
      }
      container.appendChild(renderMessage(msg));
    }
    seenMessageCount = msgs.length;

    // Only auto-scroll if user is near the bottom (not reading history)
    var atBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 120;

    if (msgs.length > 0 && atBottom) {
      container.scrollTop = container.scrollHeight;
    }

    // Show/hide status bar based on currentTurn
    var bar = $('#status-bar');
    if (meeting.status === 'active' && meeting.currentTurn) {
      bar.style.display = 'flex';
      var phaseLabel = PHASE_LABELS[meeting.currentPhase] || (meeting.currentPhase || '').toUpperCase();
      $('#status-bar-text').textContent = phaseLabel + ' — Waiting for ' + meeting.currentTurn + ' to respond...';
    } else {
      bar.style.display = 'none';
    }

    // Meeting concluded
    if (meeting.status === 'concluded' || meeting.status === 'cancelled') {
      stopPolling();
      clearMeetingState();
      meetingActive = false;
      updateUIForIdle();
      if (meeting.summary) renderSummary(meeting.summary, meeting.mode, meeting);
      if (meeting.status === 'concluded') {
        showBanner('success', 'Meeting concluded — summary below.');
      }
    }
  } catch(e) { /* retry next tick */ }
}

function renderMessage(msg) {
  const div = document.createElement('div');
  div.className = msg.authorId === '__system_moderator__' ? 'msg system' : 'msg agent';
  const initial = (msg.authorName || '?')[0].toUpperCase();
  let metaRight = new Date(msg.timestamp).toLocaleTimeString();
  if (msg.durationMs != null) {
    metaRight += ' &middot; took ' + formatDuration(msg.durationMs);
  }
  div.innerHTML = `
    <div class="msg-avatar">${initial}</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-author">${escapeHtml(msg.authorName)}</span>
        <span class="msg-phase">${msg.phase}</span>
        <span>${metaRight}</span>
      </div>
      <div class="msg-content">${escapeHtml(msg.content)}</div>
    </div>
  `;
  return div;
}

function formatDuration(ms) {
  if (ms < 1000) return (ms / 1000).toFixed(1) + 's';
  if (ms < 60000) return Math.round(ms / 1000) + 's';
  var mins = Math.floor(ms / 60000);
  var secs = Math.round((ms % 60000) / 1000);
  return mins + 'm ' + secs + 's';
}

function renderSummary(s, mode, meeting) {
  const container = $('#transcript-container');
  let html = '<div class="summary-box"><h3>' + (mode === 'collaboration' ? 'Project Summary' : 'Meeting Summary') + '</h3>';
  if (meeting && meeting.createdAt && meeting.concludedAt) {
    html += '<p style="margin-bottom:12px;color:#6b7280;font-size:13px"><strong>Total duration:</strong> ' + formatDuration(meeting.concludedAt - meeting.createdAt) + '</p>';
  }
  html += `<p style="margin-bottom:12px"><strong>Outcome:</strong> ${escapeHtml(s.consensus)}</p>`;
  if (s.keyPoints?.length) {
    html += '<p style="margin-bottom:4px"><strong>Key Points:</strong></p><ul>' + s.keyPoints.map(p => `<li>${escapeHtml(p)}</li>`).join('') + '</ul>';
  }
  if (s.actionItems?.length) {
    html += '<p style="margin-top:12px;margin-bottom:4px"><strong>Action Items:</strong></p><ul>' + s.actionItems.map(a => `<li>${escapeHtml(a)}</li>`).join('') + '</ul>';
  }
  if (s.voteTally) html += `<p style="margin-top:8px"><strong>Vote:</strong> YES=${s.voteTally.yes ?? 0} NO=${s.voteTally.no ?? 0} ABSTAIN=${s.voteTally.abstain ?? 0}</p>`;
  if (s.deliverables?.length) {
    html += '<p style="margin-top:12px;margin-bottom:4px"><strong>Deliverables:</strong></p><ul>' + s.deliverables.map(d => `<li>${escapeHtml(d)}</li>`).join('') + '</ul>';
  }
  html += '</div>';
  container.insertAdjacentHTML('beforeend', html);
  container.scrollTop = container.scrollHeight;
}

function updateStatus(status) {
  const el = $('#meeting-status');
  el.textContent = status;
  el.className = 'status ' + status;
}

function showBanner(type, msg) {
  const el = $('#banner-container');
  el.innerHTML = `<div class="banner banner-${type}">${escapeHtml(msg)}</div>`;
}
function clearBanner() { $('#banner-container').innerHTML = ''; }

// ── Directory browser ──
function toggleBrowser() {
  const panel = $('#dir-browser');
  if (panel.style.display === 'none' || !panel.style.display) {
    panel.style.display = 'block';
    navigateBrowser($('#workdir').value.trim() || '');
  } else {
    panel.style.display = 'none';
  }
}

async function navigateBrowser(path) {
  try {
    const url = '/fs/ls' + (path ? '?path=' + encodeURIComponent(path) : '');
    const res = await fetch(url);
    if (!res.ok) throw new Error('Cannot read directory');
    renderBrowser(await res.json());
  } catch (e) {
    $('#dir-browser-entries').innerHTML = '<div style="color:#fca5a5;font-size:12px;padding:4px">' + escapeHtml(e.message) + '</div>';
    $('#dir-browser-path').textContent = path || '(current directory)';
  }
}

function renderBrowser(data) {
  $('#dir-browser-path').textContent = data.current;
  let html = '';
  if (data.parent && data.parent !== data.current) {
    html += '<div class="dir-entry" data-action="navigate" data-path="' + escapeAttr(data.parent) + '">&larr; ..</div>';
  }
  if (!data.dirs || data.dirs.length === 0) {
    html += '<div style="color:#6b7280;font-size:12px;padding:4px">No subdirectories</div>';
  } else {
    data.dirs.forEach(function (d) {
      html += '<div class="dir-entry">'
        + '<span data-action="navigate" data-path="' + escapeAttr(d.path) + '" style="flex:1">' + escapeHtml(d.name) + '/</span>'
        + '<span class="select-link" data-action="select" data-path="' + escapeAttr(d.path) + '">Select</span>'
        + '</div>';
    });
  }
  $('#dir-browser-entries').innerHTML = html;

  $$('#dir-browser-entries [data-action="navigate"]').forEach(function (el) {
    el.addEventListener('click', function () { navigateBrowser(el.dataset.path); });
  });
  $$('#dir-browser-entries [data-action="select"]').forEach(function (el) {
    el.addEventListener('click', function (e) {
      e.stopPropagation();
      selectWorkdir(el.dataset.path);
    });
  });
}

async function createFolder() {
  const input = $('#dir-browser-new-name');
  const name = input.value.trim();
  if (!name) return;
  const parent = $('#dir-browser-path').textContent || '';
  try {
    const res = await fetch('/fs/mkdir', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ parent, name }),
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error); }
    input.value = '';
    navigateBrowser(parent);
  } catch (e) {
    showBanner('error', 'Cannot create folder: ' + escapeHtml(e.message));
  }
}

function selectWorkdir(path) {
  $('#workdir').value = path;
  $('#dir-browser').style.display = 'none';
}

function escapeAttr(s) {
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function clearMeetingState() {
  sessionStorage.removeItem('meetingId');
  sessionStorage.removeItem('meetingTopic');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
</body>
</html>
