server:
  port: 4200
  host: "0.0.0.0"
  dataDir: "./data"

agents:
  # ── Browser agents (free chat UIs — no API key needed) ──
  # You log in manually in the browser window that opens.

  - id: chatgpt
    name: "ChatGPT"
    type: browser
    capabilities: [general, creative, brainstorming, coding]
    site: chatgpt
    timeoutMs: 120000

  - id: claude-web
    name: "Claude Web"
    type: browser
    capabilities: [analysis, reasoning, writing, coding]
    site: claude
    timeoutMs: 120000

  - id: gemini-web
    name: "Gemini Web"
    type: browser
    capabilities: [general, coding, multimodal]
    site: gemini
    timeoutMs: 120000

  - id: deepseek-web
    name: "DeepSeek Web"
    type: browser
    capabilities: [coding, analysis, architecture]
    site: deepseek
    timeoutMs: 120000

  # ── Builders (subprocess — these can write code, run commands, create files) ──

  - id: claude-code
    name: "Claude Code"
    type: subprocess
    tool: claude-code
    capabilities: [coding, building, debugging, testing, architecture]
    command: claude
    args: ["-p", "{prompt}", "--output-format", "text", "--permission-mode", "bypassPermissions", "--bare"]
    timeoutMs: 1800000

  - id: openclaw
    name: "OpenClaw"
    type: subprocess
    tool: generic
    capabilities: [coding, building, scripting, automation]
    command: openclaw
    args: ["agent", "--local", "--json", "--session-id", "{meetingId}", "-m", "{prompt}"]
    timeoutMs: 1800000

  - id: hermes
    name: "Hermes"
    type: subprocess
    tool: generic
    capabilities: [coding, building, debugging, architecture]
    command: /Users/matthew/hermes-agent/venv/bin/python
    args: ["run_agent.py", "-q", "{prompt}", "--max_turns", "15", "-e", "development"]
    cwd: /Users/matthew/hermes-agent
    timeoutMs: 1800000

  # ── Thinkers (LLM API — reasoning, planning, creative) ──

  - id: deepseek
    name: "DeepSeek"
    type: llm
    capabilities: [architecture, planning, coding, analysis, reasoning]
    provider: deepseek
    model: deepseek-chat
    apiKey: "${DEEPSEEK_API_KEY}"

  - id: deepseek-reasoner
    name: "DeepSeek Reasoner"
    type: llm
    capabilities: [architecture, planning, reasoning, analysis]
    provider: deepseek
    model: deepseek-reasoner
    apiKey: "${DEEPSEEK_API_KEY}"

  - id: deepseek-v4-pro
    name: "DeepSeek V4 Pro"
    type: llm
    capabilities: [architecture, planning, coding, analysis, reasoning]
    provider: deepseek
    model: deepseek-v4-pro
    apiKey: "${DEEPSEEK_API_KEY}"

  - id: deepseek-v4-flash
    name: "DeepSeek V4 Flash"
    type: llm
    capabilities: [coding, brainstorming, iteration]
    provider: deepseek
    model: deepseek-v4-flash
    apiKey: "${DEEPSEEK_API_KEY}"

  - id: minimax
    name: "MiniMax"
    type: llm
    capabilities: [brainstorming, creative, design, writing, iteration]
    provider: minimax
    model: abab6.5s-chat
    apiKey: "${MINIMAX_API_KEY}"

  - id: minimax-m2.7
    name: "MiniMax M2.7"
    type: llm
    capabilities: [brainstorming, creative, design, writing, iteration, coding, reasoning]
    provider: minimax
    model: minimax-m2.7
    apiKey: "${MINIMAX_API_KEY}"

  - id: qwen
    name: "Qwen 3.5"
    type: llm
    capabilities: [coding, reasoning, analysis]
    provider: qwen
    model: qwen-max
    apiKey: "${QWEN_API_KEY}"

  - id: kimi
    name: "Kimi K2.6"
    type: llm
    capabilities: [coding, analysis, reasoning]
    provider: kimi
    model: kimi-latest
    apiKey: "${MOONSHOT_API_KEY}"

  - id: kimi-code
    name: "Kimi Code"
    type: llm
    capabilities: [coding, debugging, building]
    provider: kimi-code
    model: kimi-for-coding
    apiKey: "${KIMI_API_KEY}"

  # ── Local LLMs (self-hosted — no cloud API key needed) ──

  - id: vllm
    name: "vLLM"
    type: llm
    capabilities: [coding, reasoning, analysis]
    provider: openai-compat
    model: "${VLLM_MODEL:-meta-llama/Llama-4-Scout-17B-16E-Instruct}"
    apiKey: "not-needed"
    endpoint: "${VLLM_ENDPOINT:-http://127.0.0.1:8000/v1}"

  - id: lmstudio
    name: "LM Studio"
    type: llm
    capabilities: [coding, reasoning, creative]
    provider: openai-compat
    model: "${LMSTUDIO_MODEL:-local-model}"
    apiKey: "not-needed"
    endpoint: "${LMSTUDIO_ENDPOINT:-http://127.0.0.1:1234/v1}"

meetings:
  mode: debate
  turnTimeoutMs: 60000
  maxRebuttalRounds: 1
  maxDeliberationTurns: 10
  maxTotalTurns: 50
  defaultModerator: deepseek
