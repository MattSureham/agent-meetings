server:
  port: 4200
  host: "0.0.0.0"
  dataDir: "./data"

agents:
  - id: deepseek
    name: "DeepSeek"
    type: llm
    capabilities: [architecture, planning, coding, analysis, reasoning]
    provider: deepseek
    model: deepseek-chat
    apiKey: "${DEEPSEEK_API_KEY}"

  - id: minimax
    name: "MiniMax"
    type: llm
    capabilities: [brainstorming, creative, design, writing, iteration]
    provider: minimax
    model: abab6.5s-chat
    apiKey: "${MINIMAX_API_KEY}"

meetings:
  turnTimeoutMs: 60000
  maxRebuttalRounds: 1
  maxDeliberationTurns: 10
  defaultModerator: deepseek
